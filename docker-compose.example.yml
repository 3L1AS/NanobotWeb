services:
  # The sleek local dashboard
  nanobot-dashboard:
    container_name: nanobot-dashboard
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override this if your docker socket has a different GID
        # Find it with: stat -c '%g' /var/run/docker.sock
        DOCKER_GID: ${DOCKER_GID:-999}
    volumes:
      # Mount .nanobot directory to container home directory
      # The container user 'nextjs' has home directory at /home/nextjs
      - ~/.nanobot:/home/nextjs/.nanobot
      # Essential: Mount the host's Docker socket for container communication
      # IMPORTANT: Socket must be readable by docker group (usually GID 988-999)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # SECURITY WARNING: Change this password! Use a strong, unique password
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin}
      - NANOBOT_CONTAINER_NAME=nanobot-gateway
      # Not needed - automatically uses os.homedir() + .nanobot
      # - NANOBOT_DIR=/home/nextjs/.nanobot
      - NODE_ENV=production
    # Security options
    security_opt:
      - no-new-privileges:true
    # Read-only root filesystem for better security
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    # Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    # Restart policy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/status', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); });"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
